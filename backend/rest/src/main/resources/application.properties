server.port=8080
spring.application.name=giteat
spring.profiles.active=dev
# spring.profiles.active=release # release

# DataBase Settings for dev
## Local에서 DB 접속
# spring.datasource.url=jdbc:mysql://i12b108.p.ssafy.io:3307/giteat?serverTimezone=UTC
# Docker 컨테이너에서 mysql DB 접속
spring.datasource.url=jdbc:mysql://giteat-db:3306/giteat?serverTimezone=UTC

# 나머지 설정은 동일
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# if you release, change ddl-auto value none or validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# DataBase Settings for release
spring.datasource.url=jdbc:mysql://i12b108.p.ssafy.io:3307/giteat?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# open AI
spring.ai.openai.api-key=value

# Mybatis Setting
mybatis.mapper-locations=classpath:mybatis/**/*.xml
mybatis.config-location=classpath:mapper/mybatisConfig.xml
mybatis.type-aliases-package=com.giteat.*.dto

