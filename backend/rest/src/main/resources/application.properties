spring.application.name=giteat
spring.profiles.active=dev
# spring.profiles.active=release # release

server.port=8081

oauth.gitlab.redirect-uri=http://127.0.0.1:5173/loading
oauth.gitlab.token-uri=https://lab.ssafy.com/oauth/token
oauth.gitlab.user-info-uri=https://lab.ssafy.com/api/v4/user

spring.profiles.include=secret

